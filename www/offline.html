<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anjani Water — Offline</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f9ff; color: #0c4a6e; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 900; margin: 0 0 0.5rem; }
    p { color: #64748b; font-size: 0.9rem; max-width: 280px; }
    button { margin-top: 2rem; padding: 0.75rem 2rem; background: #0c4a6e; color: white; border: none; border-radius: 999px; font-weight: bold; font-size: 0.875rem; cursor: pointer; }
    .badge { margin-top: 1rem; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; border-radius: 999px; padding: 0.25rem 0.75rem; font-size: 0.7rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="icon">💧</div>
  <h1>You're Offline</h1>
  <p>Your last data is saved on this device. Connect to internet to sync new changes.</p>
  <div class="badge">⚡ Offline Mode — Data Queued for Sync</div>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
